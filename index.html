<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SPAR POC – Passkey &amp; OIDC</title>

  <!--
    SCRIPT LOAD ORDER (critical):
      1. gigya.js            — initialises gigya global
      2. __gigyaOIDCConfig   — must be set BEFORE gigya.oidc.js loads
      3. gigya.oidc.js       — reads config on load, exposes gigya.oidc.op.*
  -->
  <script src="https://cdns.eu1.gigya.com/JS/gigya.js?apiKey=4_q7bWSrrfARGv_vP1knVRIg"></script>

  <script>
    window.__gigyaOIDCConfig = {
      loginURL:   "https://kingcode-software.github.io/spar-poc/",
      consentURL: "https://kingcode-software.github.io/spar-poc/",
      errorURL:   "https://kingcode-software.github.io/spar-poc/"
    };
  </script>

  <script src="https://cdns.eu1.gigya.com/JS/gigya.oidc.js?apiKey=4_q7bWSrrfARGv_vP1knVRIg"></script>

  <style>
    :root {
      --dark: #003366; --mid: #0055aa; --light: #e8f0fb;
      --red: #e8001c; --text: #1a1a2e; --muted: #6b7280; --r: 10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--light); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 32px 20px;
    }
    header { text-align: center; margin-bottom: 24px; }
    header h1 { font-size: 1.8rem; color: var(--dark); }
    header p  { color: var(--muted); margin-top: 6px; font-size: 0.9rem; }

    .card {
      background: white; border-radius: var(--r);
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 22px; width: 100%; max-width: 540px; margin-bottom: 16px;
    }
    .card h2 {
      font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--dark); margin-bottom: 14px;
      padding-bottom: 8px; border-bottom: 2px solid var(--light);
    }
    .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      flex: 1; min-width: 120px; padding: 10px 14px;
      font-size: 0.87rem; font-weight: 600; cursor: pointer;
      background: var(--dark); color: white; border: none;
      border-radius: var(--r); transition: background 0.2s;
    }
    .btn:hover { background: var(--mid); }
    .btn.sec { background: white; color: var(--dark); border: 2px solid var(--dark); }
    .btn.sec:hover { background: var(--light); }
    .btn.del { background: var(--red); }
    .btn.del:hover { background: #c0001a; }

    #status {
      width: 100%; max-width: 540px; padding: 10px 14px;
      border-radius: var(--r); font-size: 0.84rem; font-weight: 500;
      margin-bottom: 16px; display: none; line-height: 1.5;
    }
    #status.info    { background:#dbeafe; color:#1e40af; display:block; }
    #status.success { background:#dcfce7; color:#166534; display:block; }
    #status.error   { background:#fee2e2; color:#991b1b; display:block; }

    #screen-container { width: 100%; max-width: 540px; }
    footer { margin-top: 32px; color: var(--muted); font-size: 0.72rem; text-align: center; }
  </style>
</head>
<body>

<header>
  <h1>🔐 SPAR POC</h1>
  <p>Passkey · OIDC Authorization Code Flow · Scoped Claims</p>
</header>

<div id="status"></div>

<div class="card">
  <h2>🔑 Authentication</h2>
  <div class="btn-group">
    <button class="btn"     onclick="showPasskeyRegister()">Register Passkey</button>
    <button class="btn sec" onclick="showStandardLogin()">Standard Login</button>
    <button class="btn del" onclick="doLogout()">Logout</button>
  </div>
</div>

<div class="card">
  <h2>👤 Session</h2>
  <div class="btn-group">
    <button class="btn sec" onclick="checkSession()">Check Session</button>
    <button class="btn sec" onclick="getAccountInfo()">Get Account Info</button>
  </div>
</div>

<div id="screen-container"></div>

<footer>
  EU1 · API: 4_q7bWSrrfARGv_vP1knVRIg · Client: U_XwKfuhT-wL5cbVQYZ47En0
</footer>

<script>
// ── Utility ───────────────────────────────────────────────────────────────
function setStatus(msg, type) {
  var el = document.getElementById('status');
  el.innerHTML = msg;
  el.className = type;
}

// ── OIDC Proxy Flow ───────────────────────────────────────────────────────
//
// Called by gigya.js once SDK is ready.
//
// Flow when ?context= is present in URL:
//   1. getContextData()   — decode context JWT → get client_id, redirect_uri
//   2. getAccountInfo()   — get active session proof (UID + signature)
//   3. Call accounts.oidc.authorize REST API → returns redirect URL with code
//   4. Navigate browser to that URL → Postman callback receives ?code=XXXX
//
// Using the REST API (step 3) instead of re-redirecting to /authorize
// prevents the loop caused by CDC bouncing back to the proxy page again.
//
window.onGigyaServiceReady = function() {
  var params  = new URLSearchParams(window.location.search);
  var context = params.get('context');

  // Guard: strip context from URL after reading to prevent loop on reload
  if (context && window.history && window.history.replaceState) {
    var cleanUrl = window.location.pathname;
    window.history.replaceState({}, document.title, cleanUrl);
  }

  if (!context) {
    console.log('[CDC] Ready — normal page load');
    return;
  }

  console.log('[OIDC] Context detected — starting proxy flow');
  setStatus('🔄 <b>Step 1/3</b> — Decoding OIDC context…', 'info');

  // Step 1: Decode the signed context JWT
  gigya.oidc.op.getContextData({
    callback: function(ctx) {
      console.log('[OIDC] Context decoded:', JSON.stringify(ctx, null, 2));

      if (ctx.errorCode !== 0) {
        setStatus('❌ Context decode failed: ' + ctx.errorMessage, 'error');
        return;
      }

      setStatus('🔄 <b>Step 2/3</b> — Checking session…', 'info');

      // Step 2: Get active session proof
      gigya.accounts.getAccountInfo({
        callback: function(acct) {
          console.log('[OIDC] Session check errorCode:', acct.errorCode);

          if (acct.errorCode !== 0) {
            // No session — show login, reload with clean URL will not re-trigger
            // (context was already stripped from URL above)
            setStatus('⚠️ No active session — please log in', 'error');
            gigya.accounts.showScreenSet({
              screenSet:   'Default-RegistrationLogin',
              startScreen: 'gigya-login-screen',
              containerID: 'screen-container',
              onLogin: function() {
                // After login, manually complete the flow with saved context
                completeOidcFlow(ctx, context, params);
              }
            });
            return;
          }

          completeOidcFlow(ctx, acct, context, params);
        }
      });
    }
  });
};

// Step 3: Exchange session for authorization code via CDC REST API
// Uses accounts.oidc.authorize — returns the redirect URL with ?code=
// instead of doing a browser redirect that loops back to this page.
function completeOidcFlow(ctx, acct, context, params) {
  setStatus('🔄 <b>Step 3/3</b> — Exchanging session for authorization code…', 'info');

  var uid          = acct.UID;
  var uidSig       = acct.UIDSignature;
  var sigTimestamp = acct.signatureTimestamp;
  var scope        = params.get('scope') || 'openid';
  var state        = params.get('state') || '';

  console.log('[OIDC] Calling accounts.oidc.authorize for UID:', uid);

  // accounts.oidc.authorize — CDC server-side authorization
  // Returns: { redirectURL: "https://oauth.pstmn.io/v1/callback?code=XXXX" }
  // This avoids the browser redirect loop because CDC responds with the
  // redirect URL in the callback rather than issuing a 302.
  gigya.accounts.oidc.authorize({
    context:            context,
    response_type:      'code',
    client_id:          ctx.client_id,
    redirect_uri:       ctx.redirect_uri,
    scope:              scope,
    UID:                uid,
    UIDSignature:       uidSig,
    signatureTimestamp: sigTimestamp,
    state:              state,
    callback: function(res) {
      console.log('[OIDC] oidc.authorize response:', JSON.stringify(res, null, 2));

      if (res.errorCode !== 0) {
        // Fallback: if oidc.authorize not available, try direct REST call
        console.warn('[OIDC] oidc.authorize failed, trying REST fallback');
        authorizeViaRest(ctx, acct, context, scope, state);
        return;
      }

      if (res.redirectURL) {
        setStatus('✅ Authorization code issued — redirecting to Postman…', 'success');
        console.log('[OIDC] Redirecting to:', res.redirectURL);
        window.location.href = res.redirectURL;
      } else {
        setStatus('❌ No redirect URL in response', 'error');
        console.error('[OIDC] Unexpected response structure:', res);
      }
    }
  });
}

// REST fallback: POST to accounts.oidc.authorize REST endpoint directly
// Used if the JS SDK method is unavailable
function authorizeViaRest(ctx, acct, context, scope, state) {
  var apiBase = 'https://accounts.eu1.gigya.com/accounts.oidc.authorize';
  var body    = new URLSearchParams({
    apiKey:             '4_q7bWSrrfARGv_vP1knVRIg',
    context:            context,
    response_type:      'code',
    client_id:          ctx.client_id,
    redirect_uri:       ctx.redirect_uri,
    scope:              scope,
    UID:                acct.UID,
    UIDSignature:       acct.UIDSignature,
    signatureTimestamp: acct.signatureTimestamp,
    state:              state || ''
  });

  fetch(apiBase, { method: 'POST', body: body,
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
  })
  .then(function(r) { return r.json(); })
  .then(function(res) {
    console.log('[OIDC] REST authorize response:', res);
    if (res.redirectURL) {
      setStatus('✅ Code issued (REST) — redirecting…', 'success');
      window.location.href = res.redirectURL;
    } else {
      setStatus('❌ REST authorize failed: ' + (res.errorMessage || JSON.stringify(res)), 'error');
    }
  })
  .catch(function(err) {
    setStatus('❌ REST call error: ' + err.message, 'error');
    console.error('[OIDC] REST error:', err);
  });
}

// ── Authentication Screen Sets ────────────────────────────────────────────
function showPasskeyRegister() {
  gigya.accounts.showScreenSet({
    screenSet: 'Default-RegistrationLogin',
    startScreen: 'gigya-passkey-registration-screen',
    containerID: 'screen-container',
    onAfterSubmit: function(e) {
      if (e.response && e.response.errorCode === 0)
        setStatus('✅ Passkey registered!', 'success');
    },
    onError: function(e) { setStatus('❌ ' + (e.errorMessage || 'Error'), 'error'); }
  });
}

function showStandardLogin() {
  gigya.accounts.showScreenSet({
    screenSet: 'Default-RegistrationLogin',
    startScreen: 'gigya-login-screen',
    containerID: 'screen-container',
    onLogin: function(e) {
      setStatus('✅ Logged in — ' + (e.profile && e.profile.email || e.UID), 'success');
    },
    onError: function(e) { setStatus('❌ ' + (e.errorMessage || 'Error'), 'error'); }
  });
}

// ── Session Info ──────────────────────────────────────────────────────────
function checkSession() {
  gigya.accounts.getAccountInfo({
    callback: function(res) {
      if (res.errorCode === 0)
        setStatus('✅ Active — UID: <b>' + res.UID + '</b>' +
          (res.profile && res.profile.email ? ' | ' + res.profile.email : ''), 'success');
      else
        setStatus('⚠️ No active session (code ' + res.errorCode + ')', 'error');
    }
  });
}

function getAccountInfo() {
  gigya.accounts.getAccountInfo({
    include: 'profile,data,preferences',
    callback: function(res) {
      if (res.errorCode === 0) {
        setStatus('✅ Account loaded — see DevTools Console for full payload', 'success');
        console.log('[CDC] Account Info:', JSON.stringify(res, null, 2));
      } else {
        setStatus('❌ Failed: ' + res.errorMessage, 'error');
      }
    }
  });
}

// ── Logout ────────────────────────────────────────────────────────────────
function doLogout() {
  gigya.accounts.logout({
    callback: function() {
      setStatus('👋 Logged out', 'info');
      document.getElementById('screen-container').innerHTML = '';
    }
  });
}
</script>

</body>
</html>
