<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SPAR POC – Passkey &amp; OIDC</title>

  <!--
    SCRIPT LOAD ORDER (critical):
      1. gigya.js            — initialises gigya global
      2. __gigyaOIDCConfig   — must be set BEFORE gigya.oidc.js loads
      3. gigya.oidc.js       — reads config on load
  -->
  <script src="https://cdns.eu1.gigya.com/JS/gigya.js?apiKey=4_q7bWSrrfARGv_vP1knVRIg"></script>

  <script>
    window.__gigyaOIDCConfig = {
      loginURL:   "https://kingcode-software.github.io/spar-poc/",
      consentURL: "https://kingcode-software.github.io/spar-poc/",
      errorURL:   "https://kingcode-software.github.io/spar-poc/"
    };
  </script>

  <script src="https://cdns.eu1.gigya.com/JS/gigya.oidc.js?apiKey=4_q7bWSrrfARGv_vP1knVRIg"></script>

  <style>
    :root {
      --dark: #003366; --mid: #0055aa; --light: #e8f0fb;
      --red: #e8001c; --text: #1a1a2e; --muted: #6b7280; --r: 10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--light); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 32px 20px;
    }
    header { text-align: center; margin-bottom: 24px; }
    header h1 { font-size: 1.8rem; color: var(--dark); }
    header p  { color: var(--muted); margin-top: 6px; font-size: 0.9rem; }

    .card {
      background: white; border-radius: var(--r);
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 22px; width: 100%; max-width: 540px; margin-bottom: 16px;
    }
    .card h2 {
      font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--dark); margin-bottom: 14px;
      padding-bottom: 8px; border-bottom: 2px solid var(--light);
    }
    .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      flex: 1; min-width: 120px; padding: 10px 14px;
      font-size: 0.87rem; font-weight: 600; cursor: pointer;
      background: var(--dark); color: white; border: none;
      border-radius: var(--r); transition: background 0.2s;
    }
    .btn:hover { background: var(--mid); }
    .btn.sec { background: white; color: var(--dark); border: 2px solid var(--dark); }
    .btn.sec:hover { background: var(--light); }
    .btn.del { background: var(--red); }
    .btn.del:hover { background: #c0001a; }

    #status {
      width: 100%; max-width: 540px; padding: 10px 14px;
      border-radius: var(--r); font-size: 0.84rem; font-weight: 500;
      margin-bottom: 16px; display: none; line-height: 1.5;
    }
    #status.info    { background:#dbeafe; color:#1e40af; display:block; }
    #status.success { background:#dcfce7; color:#166534; display:block; }
    #status.error   { background:#fee2e2; color:#991b1b; display:block; }

    #screen-container { width: 100%; max-width: 540px; }
    footer { margin-top: 32px; color: var(--muted); font-size: 0.72rem; text-align: center; }
  </style>
</head>
<body>

<header>
  <h1>🔐 SPAR POC</h1>
  <p>Passkey · OIDC Authorization Code Flow · Scoped Claims</p>
</header>

<div id="status"></div>

<div class="card">
  <h2>🔑 Authentication</h2>
  <div class="btn-group">
    <button class="btn"     onclick="showPasskeyRegister()">Register Passkey</button>
    <button class="btn sec" onclick="showStandardLogin()">Standard Login</button>
    <button class="btn del" onclick="doLogout()">Logout</button>
  </div>
</div>

<div class="card">
  <h2>👤 Session</h2>
  <div class="btn-group">
    <button class="btn sec" onclick="checkSession()">Check Session</button>
    <button class="btn sec" onclick="getAccountInfo()">Get Account Info</button>
  </div>
</div>

<div id="screen-container"></div>

<footer>
  EU1 · API: 4_q7bWSrrfARGv_vP1knVRIg · Client: U_XwKfuhT-wL5cbVQYZ47En0
</footer>

<script>
// ── Utility ───────────────────────────────────────────────────────────────
function setStatus(msg, type) {
  var el = document.getElementById('status');
  el.innerHTML = msg;
  el.className = type;
}

// ── Decode context JWT payload without SDK ────────────────────────────────
//
// gigya.oidc.op.getContextData() requires client_id to still be in the URL,
// but we must strip the URL to prevent loop. Solution: decode the JWT
// ourselves — it is a standard base64url JWT, no signature verification
// needed here (CDC already signed and validated it server-side).
// Payload contains: client_id, redirect_uri (redirect_url), ctx_id, iss, exp
//
function decodeContextJwt(token) {
  try {
    var payload = token.split('.')[1];
    // base64url → base64 → decode
    var base64 = payload.replace(/-/g, '+').replace(/_/g, '/');
    var json    = decodeURIComponent(
      atob(base64).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join('')
    );
    return JSON.parse(json);
  } catch(e) {
    console.error('[OIDC] Failed to decode context JWT:', e);
    return null;
  }
}

// ── OIDC Proxy Flow ───────────────────────────────────────────────────────
//
// Flow when ?context= is present:
//   1. Decode context JWT manually (client_id, redirect_uri)
//   2. Strip URL immediately to prevent loop on any reload
//   3. Get active session (UID + UIDSignature + signatureTimestamp)
//   4. POST to accounts.oidc.authorize REST API
//      → returns { redirectURL: "...?code=XXXX" }
//   5. Navigate to redirectURL — Postman callback receives the code
//
window.onGigyaServiceReady = function() {
  var params  = new URLSearchParams(window.location.search);
  var context = params.get('context');

  if (!context) {
    // No OIDC context — check if we returned here after a redirect (loop guard)
    if (sessionStorage.getItem('oidc_in_flight')) {
      sessionStorage.removeItem('oidc_in_flight');
      setStatus('❌ CDC redirected back to proxy — check Admin Console redirect_uri and Proxy Page Override settings', 'error');
      console.error('[OIDC] Loop detected — CDC sent browser back to proxy page after authorize redirect.');
    } else {
      console.log('[CDC] Ready — normal page load');
    }
    return;
  }

  // Guard: if this exact ctx_id was already attempted, stop immediately
  var ctx_preview = decodeContextJwt(context);
  var ctx_id = ctx_preview && ctx_preview.ctx_id;
  if (ctx_id && sessionStorage.getItem('oidc_ctx_' + ctx_id)) {
    sessionStorage.removeItem('oidc_ctx_' + ctx_id);
    setStatus('❌ Loop detected — same context arrived twice. CDC is not accepting the session proof.', 'error');
    console.error('[OIDC] Duplicate ctx_id detected:', ctx_id);
    return;
  }
  if (ctx_id) sessionStorage.setItem('oidc_ctx_' + ctx_id, '1');

  console.log('[OIDC] Context detected — starting proxy flow');
  setStatus('🔄 <b>Step 1/3</b> — Decoding context…', 'info');

  // Step 1: Decode context JWT directly (no SDK call needed)
  var ctx = ctx_preview;
  if (!ctx || !ctx.client_id || !ctx.redirect_url) {
    setStatus('❌ Could not decode context JWT', 'error');
    console.error('[OIDC] Decoded payload:', ctx);
    return;
  }

  console.log('[OIDC] Context payload:', JSON.stringify(ctx, null, 2));
  console.log('[OIDC] client_id   :', ctx.client_id);
  console.log('[OIDC] redirect_url:', ctx.redirect_url);

  // Strip URL immediately — prevents accidental loop on reload
  window.history.replaceState({}, document.title, window.location.pathname);

  var scope = params.get('scope') || 'openid';
  var state = params.get('state') || '';

  setStatus('🔄 <b>Step 2/3</b> — Checking active session…', 'info');

  // Step 3: Get session proof
  gigya.accounts.getAccountInfo({
    callback: function(acct) {
      console.log('[OIDC] getAccountInfo errorCode:', acct.errorCode);

      if (acct.errorCode !== 0) {
        setStatus('⚠️ No active session — please log in', 'error');
        sessionStorage.setItem('oidc_context', context);
        sessionStorage.setItem('oidc_scope',   scope);
        sessionStorage.setItem('oidc_state',   state);
        gigya.accounts.showScreenSet({
          screenSet:   'Default-RegistrationLogin',
          startScreen: 'gigya-login-screen',
          containerID: 'screen-container',
          onLogin: function(loginResult) {
            var savedContext = sessionStorage.getItem('oidc_context');
            var savedScope   = sessionStorage.getItem('oidc_scope') || 'openid';
            var savedState   = sessionStorage.getItem('oidc_state') || '';
            sessionStorage.removeItem('oidc_context');
            sessionStorage.removeItem('oidc_scope');
            sessionStorage.removeItem('oidc_state');
            authorizeViaRest(ctx, loginResult, savedContext, savedScope, savedState);
          }
        });
        return;
      }

      // Mark that we're about to leave this page — used by loop guard above
      sessionStorage.setItem('oidc_in_flight', '1');

      authorizeViaRest(ctx, acct, context, scope, state);
    }
  });
};

// ── Complete OIDC flow via GET redirect with session proof ────────────────
//
// CDC's /authorize endpoint expects a GET request.
// We pass the UID + signature as query params alongside the context token.
// CDC validates the session server-side and issues a 302 directly to the
// RP redirect_uri (?code=XXXX) — bypassing the proxy page entirely.
//
// The loop fix: we already stripped ?context= from the URL before calling
// this function. CDC sees valid session proof, issues the code, and sends
// the browser straight to oauth.pstmn.io — it never comes back here.
//
function authorizeViaRest(ctx, acct, context, scope, state) {
  setStatus('🔄 <b>Step 3/3</b> — Redirecting to CDC to issue code…', 'info');

  var base = 'https://fidm.eu1.gigya.com/oidc/op/v1.0/4_q7bWSrrfARGv_vP1knVRIg/authorize';

  var params = [
    'response_type=code',
    'client_id='          + encodeURIComponent(ctx.client_id),
    'redirect_uri='       + encodeURIComponent(ctx.redirect_url),
    'scope='              + encodeURIComponent(scope),
    'context='            + encodeURIComponent(context),
    'UID='                + encodeURIComponent(acct.UID),
    'UIDSignature='       + encodeURIComponent(acct.UIDSignature),
    'signatureTimestamp=' + encodeURIComponent(acct.signatureTimestamp)
  ];
  if (state) params.push('state=' + encodeURIComponent(state));

  var url = base + '?' + params.join('&');

  console.log('[OIDC] GET redirect to fidm /authorize with session proof');
  console.log('[OIDC] UID:', acct.UID);
  console.log('[OIDC] redirect_uri:', ctx.redirect_url);
  console.log('[OIDC] URL:', url);

  // Single navigation — CDC validates session and 302s to redirect_uri?code=XXXX
  // The proxy page URL is gone from the browser (already stripped above),
  // so CDC has no reason to redirect back here.
  window.location.replace(url);
}

// ── Authentication Screen Sets ────────────────────────────────────────────
function showPasskeyRegister() {
  gigya.accounts.showScreenSet({
    screenSet:   'Default-RegistrationLogin',
    startScreen: 'gigya-passkey-registration-screen',
    containerID: 'screen-container',
    onAfterSubmit: function(e) {
      if (e.response && e.response.errorCode === 0)
        setStatus('✅ Passkey registered!', 'success');
    },
    onError: function(e) { setStatus('❌ ' + (e.errorMessage || 'Error'), 'error'); }
  });
}

function showStandardLogin() {
  gigya.accounts.showScreenSet({
    screenSet:   'Default-RegistrationLogin',
    startScreen: 'gigya-login-screen',
    containerID: 'screen-container',
    onLogin: function(e) {
      setStatus('✅ Logged in — ' + (e.profile && e.profile.email || e.UID), 'success');
    },
    onError: function(e) { setStatus('❌ ' + (e.errorMessage || 'Error'), 'error'); }
  });
}

// ── Session ───────────────────────────────────────────────────────────────
function checkSession() {
  gigya.accounts.getAccountInfo({
    callback: function(res) {
      if (res.errorCode === 0)
        setStatus('✅ Active — UID: <b>' + res.UID + '</b>' +
          (res.profile && res.profile.email ? ' | ' + res.profile.email : ''), 'success');
      else
        setStatus('⚠️ No active session (code ' + res.errorCode + ')', 'error');
    }
  });
}

function getAccountInfo() {
  gigya.accounts.getAccountInfo({
    include: 'profile,data,preferences',
    callback: function(res) {
      if (res.errorCode === 0) {
        setStatus('✅ Account loaded — see DevTools Console for full payload', 'success');
        console.log('[CDC] Account Info:', JSON.stringify(res, null, 2));
      } else {
        setStatus('❌ Failed: ' + res.errorMessage, 'error');
      }
    }
  });
}

// ── Logout ────────────────────────────────────────────────────────────────
function doLogout() {
  gigya.accounts.logout({
    callback: function() {
      setStatus('👋 Logged out', 'info');
      document.getElementById('screen-container').innerHTML = '';
    }
  });
}
</script>

</body>
</html>
